name: refresh-pnl

on:
  schedule:
    # GitHub Actions cron has ~5–15 min real-world latency.
    # Every 10 minutes is a sensible cap for "live" without hammering the API.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "calc_pnl.py"
      - "index.html"
      - "requirements.txt"
      - ".github/workflows/refresh.yml"

permissions:
  contents: write

concurrency:
  group: refresh-pnl
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calc_pnl
        run: python calc_pnl.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json activity_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
