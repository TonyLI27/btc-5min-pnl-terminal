name: refresh-pnl

on:
  # Auto-refresh disabled by user request (2026-05-17): no cron schedule and
  # no push trigger. Data is refreshed manually via refresh_now.bat, which
  # runs calc_pnl.py locally and pushes data.json + activity_cache.json.
  # workflow_dispatch is kept so a run can still be triggered by hand from the
  # GitHub Actions tab if ever needed.
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-pnl
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run calc_pnl
        run: python calc_pnl.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json activity_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
